<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Realistic Train Simulator Pro | Indian Railways</title>
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-wrapper">
        <div id="alp-hud">
            <button class="fullscreen-btn" onclick="window.toggleFullscreen()" title="Fullscreen">⛶</button>
            <div id="alp-container">
                <img id="alp-avatar" src="assets/alp.png" alt="ALP">
                <div>
                    <div id="alp-name">Assistant Loco Pilot (ALP)</div>
                    <div id="signal-callout">🔴 Starter signal red</div>
                </div>
            </div>
        </div>

        <div id="mission-stat">MISSION: KOLLAM → TVC</div>

        <canvas id="gameCanvas"></canvas>

        <div id="cockpit-ui">
            <!-- ⚡ COLUMN 1: ANALOG SPEEDO -->
            <div class="cockpit-column">
                <div class="speed-container">
                    <canvas id="speedCanvas"></canvas>
                </div>
            </div>

            <!-- 🎛️ COLUMN 2: MASTER CONTROLLER (NOTCH) -->
            <div class="cockpit-column">
                <label style="color: #666; font-size: 0.6rem; margin-bottom: 5px;">MASTER CONTROLLER</label>
                <div class="notch-controls">
                    <button class="notch-btn" onclick="window.notchUp()">NOTCH +</button>
                    <div id="notch-val" class="notch-display">N 0</div>
                    <button class="notch-btn" onclick="window.notchDown()">NOTCH -</button>
                </div>
            </div>

            <!-- 🖥️ COLUMN 3: DDU (DIAGNOSTIC DISPLAY UNIT) -->
            <div class="cockpit-column">
                <div class="ddu-screen">
                    <canvas id="dduCanvas"></canvas>
                </div>
            </div>

            <!-- ⌨️ COLUMN 4: COMMAND PANEL -->
            <div class="cockpit-column">
                <div class="button-strip">
                    <button onclick="window.horn()">HORN [H]</button>
                    <button id="light-btn" onclick="window.toggleLights()">LIGHTS [L]</button>
                    <button class="danger" onclick="window.emergencyBrake()">EMERGENCY [B]</button>
                </div>
            </div>
        </div>
    </div>

    <div id="start-overlay">
        <div class="start-box">
            <div style="font-size: 3rem; margin-bottom: 10px;">🇮🇳</div>
            <h1>INDIAN RAILWAYS</h1>
            <p>Realistic Simulator Pro</p>
            <div style="color: #00ff88; font-size: 0.7rem; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px;">Mobile Elite Build V151.25</div>
            <button onclick="startMobileAudio()">ACTIVATE SYSTEMS</button>
            <p style="font-size: 0.6rem; color: #888; margin-top: 15px;">Landscape Mode & Fullscreen Recommended</p>
        </div>
    </div>

    <!-- 📱 ORIENTATION LOCK OVERLAY (V151.11) -->
    <div id="orientation-overlay">
        <div class="rotate-box">
            <div style="font-size: 3rem; margin-bottom: 15px;">🔄</div>
            <h2 style="font-family: Arial, sans-serif; color: #00ff88;">PLEASE ROTATE DEVICE</h2>
            <p style="color: white; font-family: Arial, sans-serif;">Landscape mode required for driving</p>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
